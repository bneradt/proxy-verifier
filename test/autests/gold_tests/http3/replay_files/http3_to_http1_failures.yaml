meta:
  version: '1.0'
sessions:
- protocol:
  - name: http
    version: 3
  - name: tls
    sni: test_sni
  - name: tcp
  - name: ip

  transactions:

  - client-request:
      headers:
        encoding: esc_json
        fields:
        - [ :method, GET ]
        - [ :scheme, https ]
        - [ :authority, example.data.com ]
        - [ :path, /a/path ]
        - [ X-Request-Header, { value: request, as: equal } ]

    proxy-request:
      # HTTP/1 on the server-side.
      protocol:
      - name: http
        version: 1
      - name: tls
        sni: test_sni
      - name: tcp
      - name: ip

      headers:
        fields:
        - [ X-Request-Header, { value: request, as: equal } ]

    server-response:
      status: 200
      reason: OK
      headers:
        encoding: esc_json
        fields:
        - [ X-Equal-Header, some_content ]
        - [ X-Response-Header, response ]
        - [ X-Deleted-Header2, this_will_be_deleted ]
        - [ X-Proxy-Directive, "Delete=%<x-deleted-header2%> Insert=%<x-added-header: 1%>" ]
        - [ Content-Length, 32 ]
      content:
        encoding: plain
        size: 32

    # Test failures of field verification.
    proxy-response:
      status: 502
      headers:
        encoding: esc_json
        fields:
        - [ X-Equal-Header, { value: other_content, as: equal } ]
        - [ X-Response-Header, { value: response, as: equal } ]
        - [ X-Deleted-Header2, { as: present } ]
        - [ X-Added-Header2, { as: absent } ]
