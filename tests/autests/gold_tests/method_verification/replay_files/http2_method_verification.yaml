meta:
  version: "1.0"

sessions:
- protocol:
    stack: http2
    tls:
      sni: test_sni
  transactions:
  - client-request:
      headers:
        encoding: esc_json
        fields:
        - [ :method, GET ]
        - [ :scheme, https ]
        - [ :authority, example.com ]
        - [ :path, /pass ]
        - [ uuid, 1 ]
      content:
        encoding: plain
        size: 0

    proxy-request:
      protocol:
        stack: http2
        tls:
          sni: test_sni
      headers:
        encoding: esc_json
        fields:
        - [ :method, { value: GET, as: equal } ]
        - [ :scheme, { value: https, as: equal } ]
        - [ :authority, { value: example.com, as: equal } ]
        - [ :path, { value: /pass, as: equal } ]
        - [ uuid, { value: 1, as: equal } ]

    server-response:
      status: 200
      headers:
        encoding: esc_json
        fields:
        - [ Content-Length, "0" ]
      content:
        encoding: plain
        size: 0

  - client-request:
      headers:
        encoding: esc_json
        fields:
        - [ :method, GET ]
        - [ :scheme, https ]
        - [ :authority, example.com ]
        - [ :path, /fail ]
        - [ uuid, 2 ]
      content:
        encoding: plain
        size: 0

    proxy-request:
      protocol:
        stack: http2
        tls:
          sni: test_sni
      headers:
        encoding: esc_json
        fields:
        - [ :method, { value: POST, as: equal } ]
        - [ :scheme, { value: https, as: equal } ]
        - [ :authority, { value: example.com, as: equal } ]
        - [ :path, { value: /fail, as: equal } ]
        - [ uuid, { value: 2, as: equal } ]

    server-response:
      status: 200
      headers:
        encoding: esc_json
        fields:
        - [ Content-Length, "0" ]
      content:
        encoding: plain
        size: 0
