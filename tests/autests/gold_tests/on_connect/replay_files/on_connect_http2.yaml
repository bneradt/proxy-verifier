meta:
  version: '1.0'

sessions:
- protocol:
    stack: http2
    tls:
      sni: test_sni

  transactions:
  - client-request:
      method: GET
      url: https://example.com/accept
      version: '1.1'
      headers:
        fields:
        - [ Host, example.com ]
        - [ uuid, 1 ]

    proxy-request:
      protocol:
        stack: https
        tls:
          sni: test_sni
    proxy-response:
      status: 200

    server-response:
      status: 200
      reason: OK
      headers:
        fields:
        - [ Content-Length, '0' ]
        - [ uuid, 1 ]

- protocol:
    stack: http2
    tls:
      sni: test_sni

  transactions:
  - client-request:
      method: GET
      url: https://example.com/refuse
      version: '1.1'
      headers:
        fields:
        - [ Host, example.com ]
        - [ uuid, 2 ]

    proxy-request:
      protocol:
        stack: https
        tls:
          sni: test_sni
    proxy-response:
      status: 502

    server-response:
      on_connect: refuse

- protocol:
    stack: http2
    tls:
      sni: test_sni

  transactions:
  - client-request:
      method: GET
      url: https://example.com/reset
      version: '1.1'
      headers:
        fields:
        - [ Host, example.com ]
        - [ uuid, 3 ]

    proxy-request:
      protocol:
        stack: https
        tls:
          sni: test_sni
    proxy-response:
      status: 502

    server-response:
      on_connect: reset
