meta:
  version: '1.0'

sessions:
- transactions:
  - client-request:
      method: GET
      url: http://example.com/accept
      version: '1.1'
      headers:
        fields:
        - [ Host, example.com ]
        - [ uuid, 1 ]

    proxy-response:
      status: 200

    server-response:
      status: 200
      reason: OK
      headers:
        fields:
        - [ Content-Length, '0' ]
        - [ uuid, 1 ]

- transactions:
  - client-request:
      method: GET
      url: http://example.com/refuse
      version: '1.1'
      headers:
        fields:
        - [ Host, example.com ]
        - [ uuid, 2 ]

    proxy-response:
      status: 502

    server-response:
      on_connect: refuse

- transactions:
  - client-request:
      method: GET
      url: http://example.com/reset
      version: '1.1'
      headers:
        fields:
        - [ Host, example.com ]
        - [ uuid, 3 ]

    proxy-response:
      status: 502

    server-response:
      on_connect: reset
