#
# Close the HTTP/3 proxy connection before any response arrives so the
# proxy-response verification rule is never processed by the client.

meta:
  version: "1.0"
sessions:
- protocol:
  - name: http
    version: 3
  - name: tls
    sni: test_sni
  - name: tcp
  - name: ip
    version: 4
  transactions:
  - client-request:
      headers:
        fields:
        - [ :method, GET ]
        - [ :scheme, https ]
        - [ :authority, example.com ]
        - [ :path, /close-without-response ]
        - [ uuid, unprocessed-response-h3-1 ]
        - [ X-Proxy-Directive, CloseConnection=%<now%> ]
    proxy-response:
      status: 200
      headers:
        fields:
        - [ X-Expected, { value: expected-value, as: equal } ]
