#
# Send only the processed HTTP/1 transaction so the server-side replay retains
# one extra unprocessed verification rule at shutdown.

meta:
  version: "1.0"
sessions:
- protocol:
  - name: http
    version: 1.1
  - name: tcp
  - name: ip
    version: 4
  transactions:
  - client-request:
      method: GET
      url: http://example.com/processed
      version: "1.1"
      headers:
        fields:
        - [Host, example.com]
        - [uuid, processed-1]
        - [X-Processed, expected-value]
    proxy-response:
      status: 200
