#
# Close the HTTP/1 proxy connection before any response arrives so the
# proxy-response verification rule is never processed by the client.

meta:
  version: "1.0"
sessions:
- protocol:
    stack: http
  transactions:
  - client-request:
      method: GET
      url: http://example.com/close-without-response
      version: "1.1"
      headers:
        fields:
        - [Host, example.com]
        - [uuid, unprocessed-response-1]
        - [X-Proxy-Directive, CloseConnection=%<now%>]
    proxy-response:
      status: 200
      headers:
        fields:
        - [X-Expected, {value: expected-value, as: equal}]
