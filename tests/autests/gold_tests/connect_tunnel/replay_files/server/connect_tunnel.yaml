meta:
  version: '1.0'

sessions:
- protocol:
    stack: http

  transactions:
  - all:
      headers:
        fields:
        - [ uuid, tunneled-request ]

    proxy-request:
      method: GET
      url: /through/tunnel
      version: '1.1'
      headers:
        encoding: esc_json
        fields:
        - [ Host, verifier.example ]
        - [ Connection, close ]
        - [ X-Tunneled, true ]

    server-response:
      status: 200
      reason: OK
      content:
        encoding: plain
        data: tunnel-body
      headers:
        encoding: esc_json
        fields:
        - [ Content-Length, '11' ]
        - [ Connection, close ]
        - [ X-Tunneled-Response, true ]
