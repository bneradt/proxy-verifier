meta:
  version: "1.0"

sessions:
- protocol:
    stack: https
    tls:
      sni: bob
  transactions:
  - client-request:
      version: "1.1"
      scheme: "https"
      method: "GET"
      url: "https://example.one/config/settings.yaml"
      headers:
        fields:
        - [ Host, example.one ]
        - [ uuid, 1 ]

    proxy-request:
      protocol:
        stack: https
        tls:
          sni: bob
          proxy-provided-certificate: true

    server-response:
      status: 200
      reason: OK
      content:
        size: 16
      headers:
        fields:
        - [ Content-Type, text/html ]
        - [ Content-Length, 16 ]

    proxy-response:
      status: 200
