meta:
  version: '1.0'
sessions:
- protocol:
    stack: http2
    tls:
      sni: test_sni
  transactions:
  - client-request:
      headers:
        fields:
        - [:method, POST]
        - [:scheme, https]
        - [:authority, example.data.com]
        - [:path, /a/path]
        - [Content-Type, text/html]
        - [Content-Length, '11']
        - [uuid, 1]
      content:
        encoding: plain
        data: client_test
        size: 11

    proxy-request:
      content:
        encoding: plain
        data: client_test
        verify: {as: equal}

    server-response:
      headers:
        fields:
        - [:status, 200]
        - [Content-Type, text/html]
        - [Content-Length, '11']
      content:
        encoding: plain
        data: server_test
        size: 11

    proxy-response:
      content:
        encoding: plain
        data: server_test
        verify: {as: equal}

  - client-request:
      headers:
        fields:
        - [:method, POST]
        - [:scheme, https]
        - [:authority, example.data.com]
        - [:path, /a/path]
        - [Content-Type, text/html]
        - [Content-Length, '11']
        - [uuid, 2]
      content:
        encoding: plain
        data: client_test
        size: 11

    proxy-request:
      content:
        verify: {value: Test, as: suffix, case: ignore}

    server-response:
      headers:
        fields:
        - [:status, 200]
        - [Content-Type, text/html]
        - [Content-Length, '11']
      content:
        encoding: plain
        data: server_test
        size: 11

    proxy-response:
      content:
        verify: {value: Server, as: prefix, case: ignore}
