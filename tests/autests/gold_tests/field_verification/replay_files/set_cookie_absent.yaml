meta:
  version: '1.0'
sessions:
- protocol:
    stack: http2
    tls:
      sni: test_sni
  transactions:
  - client-request:
      headers:
        fields:
        - [:method, POST]
        - [:scheme, https]
        - [:authority, example.data.com]
        - [:path, /a/path]
        - [Content-Type, text/html]
        - [Content-Length, '11']
        - [uuid, 1]
      content:
        encoding: plain
        data: client_test
        size: 11

    server-response:
      headers:
        fields:
        - [:status, 200]
        - [Content-Type, text/html]
        - [Content-Length, '11']
      content:
        encoding: plain
        data: server_test
        size: 11

    proxy-response:
      headers:
        fields:
        - [Set-Cookie, { as: absent }]
