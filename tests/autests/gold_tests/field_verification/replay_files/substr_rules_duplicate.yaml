meta:
  version: "1.0"

sessions:
- transactions:
  - client-request:
      version: "1.1"
      method: "GET"
      url: "http://example.one/config/settings.yaml"
      headers:
        fields:
        - [ Host, example.one ]
        - [ X-Test-Contains, alpha ]
        - [ X-Test-Contains, beta ]
        - [ X-Test-Prefix, start ]
        - [ X-Test-Prefix, end ]
        - [ X-Test-Suffix, left ]
        - [ X-Test-Suffix, right ]
        - [ uuid, 1 ]

    proxy-request:
      headers:
        fields:
        - [ Host, example.one ]
        - [ X-Test-Contains, { value: "alpha, beta", as: contains } ]
        - [ X-Test-Contains, { value: gamma, as: contains } ]
        - [ X-Test-Prefix, { value: "start, e", as: prefix } ]
        - [ X-Test-Prefix, { value: end, as: prefix } ]
        - [ X-Test-Suffix, { value: right, as: suffix } ]
        - [ X-Test-Suffix, { value: left, as: suffix } ]

    server-response:
      status: 200
      reason: OK
      content:
        size: 16
      headers:
        fields:
        - [ Content-Type, text/html ]
        - [ Content-Length, 16 ]
