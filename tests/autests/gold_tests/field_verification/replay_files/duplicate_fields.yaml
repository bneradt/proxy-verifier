meta:
  version: "1.0"

sessions:
- transactions:
  - client-request:
      version: "1.1"
      method: "GET"
      url: "http://example.one/config/settings.yaml"
      headers:
        fields:
        - [ Host, example.one ]
        - [ X-Join, alpha ]
        - [ X-Join, beta ]
        - [ uuid, 1 ]

    proxy-request:
      headers:
        fields:
        - [ Host, example.one ]
        # This passes because the expected order matches the received order.
        - [ X-Join, { value: [ alpha, beta ], as: equal } ]
        # This intentionally fails because order matters for combined field values.
        - [ X-Join, { value: [ beta, alpha ], as: equal } ]
        - [ X-Join, { value: beta, as: contains } ]

    server-response:
      status: 200
      reason: OK
      content:
        size: 16
      headers:
        fields:
        - [ Content-Type, text/html ]
        - [ Content-Length, 16 ]
        - [ Cache-Control, no-store ]
        - [ Cache-Control, max-age=0 ]
        - [ Vary, "accept-encoding, accept-language" ]

    proxy-response:
      status: 200
      headers:
        fields:
        # This passes because the expected order matches the received order.
        - [ Cache-Control, { value: [ no-store, max-age=0 ], as: equal } ]
        # This intentionally fails because order matters for combined field values.
        - [ Cache-Control, { value: [ max-age=0, no-store ], as: equal } ]
        - [ Vary, { value: [ accept-encoding, accept-language ], as: equal } ]
